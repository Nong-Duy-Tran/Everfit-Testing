services:
  api:
    build: .
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - src/.env
    volumes:
      # Persist the vector store so `ingest` survives container restarts.
      - ./data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
